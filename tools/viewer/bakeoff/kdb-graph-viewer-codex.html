<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KDB GraphDB Viewer</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --panel: #ffffff;
      --panel-2: #eef2ef;
      --text: #18201c;
      --muted: #627069;
      --line: #d7ddd8;
      --accent: #0f766e;
      --accent-2: #2563eb;
      --shadow: 0 18px 48px rgba(18, 32, 26, 0.14);
      --canvas: #fbfcfa;
      --chip: #eef5f3;
      --danger: #b91c1c;
      color-scheme: light;
    }

    [data-theme="dark"] {
      --bg: #101614;
      --panel: #151d1a;
      --panel-2: #1d2824;
      --text: #edf4ef;
      --muted: #9dadA5;
      --line: #2b3934;
      --accent: #2dd4bf;
      --accent-2: #93c5fd;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
      --canvas: #0e1412;
      --chip: #20302b;
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 7px;
      min-height: 34px;
      padding: 0 10px;
      cursor: pointer;
    }

    button:hover,
    button:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    input[type="search"] {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 10px;
      background: var(--panel);
      color: var(--text);
    }

    input[type="checkbox"] {
      accent-color: var(--accent);
    }

    .app {
      display: grid;
      grid-template-columns: minmax(250px, 312px) minmax(360px, 1fr) minmax(280px, 360px);
      height: 100%;
      min-width: 0;
      min-height: 0;
    }

    .app.hide-left {
      grid-template-columns: minmax(360px, 1fr) minmax(280px, 360px);
    }

    .app.hide-right {
      grid-template-columns: minmax(250px, 312px) minmax(360px, 1fr);
    }

    .app.hide-left.hide-right {
      grid-template-columns: minmax(360px, 1fr);
    }

    .app.hide-left .panel.left,
    .app.hide-right .panel.right {
      display: none;
    }

    .panel {
      min-width: 0;
      min-height: 0;
      height: 100%;
      overflow: auto;
      background: var(--panel);
      border-color: var(--line);
      border-style: solid;
      scrollbar-width: thin;
    }

    .panel.left {
      border-width: 0 1px 0 0;
    }

    .panel.right {
      border-width: 0 0 0 1px;
    }

    .panel-inner {
      padding: 16px 16px 28px;
    }

    .brand {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.15;
      font-weight: 750;
    }

    .brand .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .icon-btn {
      width: 36px;
      min-width: 36px;
      padding: 0;
      display: grid;
      place-items: center;
      font-size: 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      padding: 9px 8px;
      min-width: 0;
    }

    .stat strong {
      display: block;
      font-size: 18px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .section {
      border-top: 1px solid var(--line);
      padding-top: 14px;
      margin-top: 14px;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 760;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .rows {
      display: grid;
      gap: 8px;
    }

    .toggle-row {
      display: grid;
      grid-template-columns: 18px 14px 1fr auto;
      align-items: center;
      gap: 8px;
      min-height: 28px;
      color: var(--text);
      font-size: 13px;
    }

    .toggle-row .count {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .swatch {
      width: 10px;
      height: 10px;
      border-radius: 99px;
      background: var(--swatch);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--swatch), transparent 75%);
    }

    .edge-swatch {
      width: 18px;
      height: 2px;
      background: var(--swatch);
      border-radius: 99px;
    }

    .edge-swatch.dashed {
      background: repeating-linear-gradient(to right, var(--swatch) 0 5px, transparent 5px 8px);
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .search-results {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }

    .result-btn {
      text-align: left;
      min-height: 42px;
      padding: 7px 9px;
      background: var(--panel-2);
      overflow: hidden;
    }

    .result-btn strong,
    .neighbor strong {
      display: block;
      font-size: 12px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .result-btn span,
    .neighbor span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .viewport {
      position: relative;
      min-width: 0;
      min-height: 0;
      background: var(--canvas);
    }

    #graph {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    #graph.dragging {
      cursor: grabbing;
    }

    .toolbar {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .toolbar-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      pointer-events: auto;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: color-mix(in srgb, var(--panel), transparent 10%);
      box-shadow: var(--shadow);
      color: var(--muted);
      font-size: 12px;
      backdrop-filter: blur(10px);
    }

    .minimap-wrap {
      position: absolute;
      right: 14px;
      bottom: 14px;
      width: 178px;
      height: 126px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: color-mix(in srgb, var(--panel), transparent 6%);
      box-shadow: var(--shadow);
    }

    #minimap {
      display: block;
      width: 100%;
      height: 100%;
    }

    .focus-chip {
      position: absolute;
      left: 14px;
      bottom: 14px;
      max-width: min(480px, calc(100% - 220px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel), transparent 8%);
      box-shadow: var(--shadow);
      padding: 10px 12px;
      backdrop-filter: blur(10px);
      pointer-events: none;
    }

    .focus-chip strong {
      display: block;
      font-size: 13px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .focus-chip span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .empty {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      color: var(--muted);
      background: var(--panel-2);
      font-size: 13px;
      line-height: 1.45;
    }

    .detail-head {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .type-badge {
      width: max-content;
      max-width: 100%;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      border-radius: 999px;
      padding: 0 10px;
      background: var(--chip);
      color: var(--text);
      font-size: 12px;
      font-weight: 650;
    }

    .detail-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.18;
      overflow-wrap: anywhere;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .meta-cell {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      padding: 8px;
      min-width: 0;
    }

    .meta-cell span {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }

    .meta-cell strong {
      display: block;
      margin-top: 3px;
      font-size: 13px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .prop-table {
      display: grid;
      gap: 6px;
    }

    .prop-row {
      display: grid;
      grid-template-columns: minmax(82px, 0.34fr) minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      border-bottom: 1px solid var(--line);
      padding-bottom: 6px;
      font-size: 12px;
      line-height: 1.35;
    }

    .prop-key {
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .prop-val {
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .neighbor-list {
      display: grid;
      gap: 7px;
    }

    .neighbor {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: var(--panel-2);
      text-align: left;
      min-height: 50px;
    }

    .legend {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      font-size: 13px;
      color: var(--text);
    }

    .range-row input {
      width: 100%;
      accent-color: var(--accent);
    }

    .range-row span {
      color: var(--muted);
      min-width: 34px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 260px minmax(320px, 1fr);
      }

      .app.hide-left,
      .app.hide-right,
      .app.hide-left.hide-right {
        grid-template-columns: minmax(320px, 1fr);
      }

      .panel.right {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: min(360px, 86vw);
        transform: translateX(calc(100% - 44px));
        transition: transform 160ms ease;
        z-index: 5;
        box-shadow: var(--shadow);
      }

      .panel.right:focus-within,
      .panel.right:hover {
        transform: translateX(0);
      }

      .app.hide-right .panel.right {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app" data-theme="light">
    <aside class="panel left">
      <div class="panel-inner">
        <div class="brand">
          <div>
            <h1>KDB GraphDB Viewer</h1>
            <div class="sub" id="subtitle">Graph export</div>
          </div>
          <button class="icon-btn" id="themeBtn" type="button" title="Toggle theme" aria-label="Toggle theme">Dark</button>
        </div>

        <div class="stats" aria-label="Graph summary">
          <div class="stat"><strong id="nodeCount">0</strong><span>nodes</span></div>
          <div class="stat"><strong id="edgeCount">0</strong><span>edges</span></div>
          <div class="stat"><strong id="visibleCount">0</strong><span>visible</span></div>
        </div>

        <div class="section">
          <p class="section-title">Search</p>
          <input id="searchInput" type="search" autocomplete="off" placeholder="Find node by name">
          <div class="search-results" id="searchResults"></div>
        </div>

        <div class="section">
          <p class="section-title">Node Types</p>
          <div class="rows" id="nodeTypeRows"></div>
        </div>

        <div class="section">
          <p class="section-title">Edge Types</p>
          <div class="rows" id="edgeTypeRows"></div>
        </div>

        <div class="section">
          <p class="section-title">View</p>
          <div class="rows">
            <label class="toggle-row">
              <input id="labelsToggle" type="checkbox">
              <span class="swatch" style="--swatch: var(--accent)"></span>
              <span>Labels</span>
              <span class="count">off</span>
            </label>
            <label class="toggle-row">
              <input id="egoToggle" type="checkbox" checked>
              <span class="swatch" style="--swatch: var(--accent-2)"></span>
              <span>Ego highlight</span>
              <span class="count">on</span>
            </label>
            <label class="range-row">
              <input id="edgeOpacity" type="range" min="15" max="100" value="72">
              <span id="edgeOpacityVal">72%</span>
            </label>
            <div class="button-row">
              <button id="fitBtn" type="button">Fit</button>
              <button id="resetBtn" type="button">Reset</button>
            </div>
          </div>
        </div>

        <div class="section">
          <p class="section-title">Legend</p>
          <div class="legend" id="legend"></div>
        </div>
      </div>
    </aside>

    <main class="viewport" id="viewport">
      <canvas id="graph"></canvas>
      <div class="toolbar">
        <div class="toolbar-group">
          <div class="pill" id="statusPill">Preparing layout</div>
        </div>
        <div class="toolbar-group">
          <button class="pill" id="toolbarThemeBtn" type="button" title="Toggle dark mode">Dark</button>
          <button class="pill" id="reflowBtn" type="button" title="Rebuild graph layout">Reflow</button>
          <button class="pill" id="leftPanelBtn" type="button" title="Toggle left panel">Left panel</button>
          <button class="pill" id="rightPanelBtn" type="button" title="Toggle right panel">Right panel</button>
          <div class="pill" id="zoomPill">100%</div>
        </div>
      </div>
      <div class="focus-chip" id="focusChip" hidden>
        <strong id="focusTitle"></strong>
        <span id="focusMeta"></span>
      </div>
      <div class="minimap-wrap" aria-hidden="true">
        <canvas id="minimap"></canvas>
      </div>
    </main>

    <aside class="panel right" tabindex="0">
      <div class="panel-inner">
        <div id="detailPanel" class="empty">Select a node to inspect its properties and graph neighborhood.</div>
      </div>
    </aside>
  </div>

    const NODE_COLORS = {
      Entity: "#2563eb",
      Domain: "#d97706",
      Source: "#0f766e",
      Claim: "#dc2626",
      default: "#7c3aed"
    };

    const EDGE_STYLES = {
      LINKS_TO: { color: "#64748b", dash: [], width: 1.15 },
      SUPPORTS: { color: "#16a34a", dash: [7, 5], width: 1.45 },
      BELONGS_TO: { color: "#d97706", dash: [], width: 1.65 },
      ALIAS_OF: { color: "#7c3aed", dash: [3, 4], width: 1.35 },
      default: { color: "#64748b", dash: [], width: 1.1 }
    };

    const app = document.querySelector(".app");
    const canvas = document.getElementById("graph");
    const ctx = canvas.getContext("2d", { alpha: false });
    const minimap = document.getElementById("minimap");
    const mctx = minimap.getContext("2d", { alpha: true });
    const viewport = document.getElementById("viewport");
    const searchInput = document.getElementById("searchInput");
    const searchResults = document.getElementById("searchResults");
    const detailPanel = document.getElementById("detailPanel");
    const focusChip = document.getElementById("focusChip");
    const focusTitle = document.getElementById("focusTitle");
    const focusMeta = document.getElementById("focusMeta");
    const statusPill = document.getElementById("statusPill");
    const zoomPill = document.getElementById("zoomPill");

    const state = {
      dpr: Math.max(1, Math.min(2.5, window.devicePixelRatio || 1)),
      width: 1,
      height: 1,
      tx: 0,
      ty: 0,
      scale: 1,
      dragging: false,
      dragStart: null,
      pointer: null,
      hovered: null,
      selected: null,
      visibleNodes: [],
      visibleEdges: [],
      visibleIds: new Set(),
      activeNodeTypes: new Set(),
      activeEdgeTypes: new Set(),
      showLabels: false,
      egoHighlight: true,
      edgeOpacity: 0.72,
      layoutReady: false,
      layoutRun: 0,
      clusterCenters: new Map(),
      clusterRadii: new Map(),
      needsRender: false
    };

    const nodes = RAW_GRAPH.nodes.map((node, index) => ({
      ...node,
      index,
      props: node.props || {},
      degree: 0,
      inDegree: 0,
      outDegree: 0,
      x: 0,
      y: 0,
      anchorX: 0,
      anchorY: 0,
      vx: 0,
      vy: 0,
      cluster: "unassigned",
      radius: 5
    }));

    const nodeById = new Map(nodes.map(node => [node.id, node]));
    const edges = RAW_GRAPH.edges
      .map((edge, index) => ({
        ...edge,
        index,
        sourceNode: nodeById.get(edge.source),
        targetNode: nodeById.get(edge.target)
      }))
      .filter(edge => edge.sourceNode && edge.targetNode);

    const neighbors = new Map(nodes.map(node => [node.id, new Set()]));
    const incidentEdges = new Map(nodes.map(node => [node.id, []]));

    for (const edge of edges) {
      edge.sourceNode.degree += 1;
      edge.sourceNode.outDegree += 1;
      edge.targetNode.degree += 1;
      edge.targetNode.inDegree += 1;
      neighbors.get(edge.source).add(edge.target);
      neighbors.get(edge.target).add(edge.source);
      incidentEdges.get(edge.source).push(edge);
      incidentEdges.get(edge.target).push(edge);
    }

    for (const node of nodes) {
      const base = node.type === "Domain" ? 11 : node.type === "Source" ? 8 : 5;
      node.radius = base + Math.min(8, Math.sqrt(node.degree) * 1.8);
    }

    const nodeTypes = [...new Set(nodes.map(node => node.type))].sort();
    const edgeTypes = [...new Set(edges.map(edge => edge.type))].sort();
    nodeTypes.forEach(type => state.activeNodeTypes.add(type));
    edgeTypes.forEach(type => state.activeEdgeTypes.add(type));

    initialize();

      document.getElementById("nodeCount").textContent = formatCount(nodes.length);
      document.getElementById("edgeCount").textContent = formatCount(edges.length);
      document.getElementById("subtitle").textContent = `${nodeTypes.length} node types / ${edgeTypes.length} edge types`;
      buildControls();
      updatePanelButtons();
      updateThemeButtons();
      buildLayout();
      resizeCanvas();
      updateVisibility();
      fitToView(false);
      bindEvents();
      runLayout(260);
      requestRender();

    function buildControls() {
      const nodeCounts = countBy(nodes, "type");
      document.getElementById("nodeTypeRows").innerHTML = nodeTypes.map(type => `
        <label class="toggle-row">
          <input type="checkbox" data-node-type="${escapeHtml(type)}" checked>
          <span class="swatch" style="--swatch: ${NODE_COLORS[type] || NODE_COLORS.default}"></span>
          <span>${escapeHtml(type)}</span>
          <span class="count">${nodeCounts.get(type) || 0}</span>
        </label>
      `).join("");

      const edgeCounts = countBy(edges, "type");
      document.getElementById("edgeTypeRows").innerHTML = edgeTypes.map(type => {
        const style = EDGE_STYLES[type] || EDGE_STYLES.default;
        const dashClass = style.dash.length ? " dashed" : "";
        return `
          <label class="toggle-row">
            <input type="checkbox" data-edge-type="${escapeHtml(type)}" checked>
            <span class="edge-swatch${dashClass}" style="--swatch: ${style.color}"></span>
            <span>${escapeHtml(type)}</span>
            <span class="count">${edgeCounts.get(type) || 0}</span>
          </label>
        `;
      }).join("");

      document.getElementById("legend").innerHTML = nodeTypes.map(type => `
        <div class="legend-item">
          <span class="swatch" style="--swatch: ${NODE_COLORS[type] || NODE_COLORS.default}"></span>
          <span>${escapeHtml(type)}</span>
        </div>
      `).join("");
    }

    function buildLayout() {
      const domainNodes = nodes.filter(node => node.type === "Domain");
      const clusterCenters = new Map();
      const clusterRadii = new Map();
      const domainIds = domainNodes.map(node => node.id);
      const fallbackDomains = domainIds.length ? domainIds : ["unassigned"];
      const domainByName = new Map(domainNodes.map(node => [normalizeDomainKey(node.name || node.props.name), node.id]));
      const entityToDomain = new Map();
      const entityToSource = new Map();

      for (const edge of edges) {
        if (edge.type === "BELONGS_TO" && edge.targetNode.type === "Domain") {
          entityToDomain.set(edge.source, edge.target);
        }
        if (edge.type === "SUPPORTS" && edge.sourceNode.type === "Source") {
          const current = entityToSource.get(edge.target);
          if (!current || edge.sourceNode.degree > current.degree) {
            entityToSource.set(edge.target, edge.sourceNode);
          }
        }
      }

      for (const node of nodes) {
        if (node.type === "Domain") {
          node.cluster = node.id;
        } else if (node.type === "Source") {
          const domainName = normalizeDomainKey(node.props.domain || node.props.primary_domain);
          node.cluster = domainByName.get(domainName) || fallbackDomains[hashString(node.id) % fallbackDomains.length];
        }
      }

      for (const node of nodes) {
        if (node.type !== "Domain" && node.type !== "Source") {
          const explicitDomain = entityToDomain.get(node.id);
          const supportedBy = entityToSource.get(node.id);
          const domainName = normalizeDomainKey(node.props.domain || node.props.primary_domain);
          node.cluster = explicitDomain?.id || supportedBy?.cluster || domainByName.get(domainName) || fallbackDomains[hashString(node.id) % fallbackDomains.length];
        }
      }

      const clusterSize = new Map();
      for (const node of nodes) {
        clusterSize.set(node.cluster, (clusterSize.get(node.cluster) || 0) + 1);
      }
      const clusterIds = [...new Set(nodes.map(node => node.cluster))]
        .sort((a, b) => (clusterSize.get(b) || 0) - (clusterSize.get(a) || 0));
      const spacingX = Math.max(1220, 700 + Math.sqrt(nodes.length) * 52);
      const spacingY = Math.max(980, 540 + Math.sqrt(nodes.length) * 42);
      const columns = Math.ceil(Math.sqrt(clusterIds.length));
      const rows = Math.ceil(clusterIds.length / columns);
      clusterIds.forEach((clusterId, index) => {
        const column = index % columns;
        const row = Math.floor(index / columns);
        clusterCenters.set(clusterId, {
          x: (column - (columns - 1) / 2) * spacingX,
          y: (row - (rows - 1) / 2) * spacingY
        });
      });

      const byCluster = new Map();
      for (const node of nodes) {
        if (!byCluster.has(node.cluster)) byCluster.set(node.cluster, []);
        byCluster.get(node.cluster).push(node);
      }

      for (const [clusterId, clusterNodes] of byCluster) {
        const center = clusterCenters.get(clusterId) || { x: 0, y: 0 };
        const ordered = clusterNodes
          .slice()
          .sort((a, b) => typeRank(a.type) - typeRank(b.type) || b.degree - a.degree || a.name.localeCompare(b.name));
        const sources = ordered.filter(node => node.type === "Source");
        const entities = ordered.filter(node => node.type !== "Domain" && node.type !== "Source");
        const sourceAnchors = new Map();

        for (const node of ordered.filter(item => item.type === "Domain")) {
          placeNode(node, center.x, center.y);
        }

        sources.forEach((node, index) => {
          const seed = hashString(node.id + node.name);
          const angle = (Math.PI * 2 * index) / Math.max(1, sources.length) + (seed % 31) / 31;
          const radius = 220 + Math.floor(index / 10) * 88 + (seed % 32);
          const x = center.x + Math.cos(angle) * radius;
          const y = center.y + Math.sin(angle) * radius;
          placeNode(node, x, y);
          sourceAnchors.set(node.id, { x, y, angle });
        });

        const entitiesBySource = new Map();
        for (const node of entities) {
          const source = entityToSource.get(node.id);
          const sourceKey = source && source.cluster === clusterId ? source.id : "__domain__";
          if (!entitiesBySource.has(sourceKey)) entitiesBySource.set(sourceKey, []);
          entitiesBySource.get(sourceKey).push(node);
        }

        const sourceGroups = [...entitiesBySource.entries()]
          .sort(([leftKey, left], [rightKey, right]) => {
            if (leftKey === "__domain__") return 1;
            if (rightKey === "__domain__") return -1;
            return right.length - left.length;
          });

        sourceGroups.forEach(([sourceKey, group], groupIndex) => {
          const sourceAnchor = sourceAnchors.get(sourceKey);
          const fallbackAngle = (Math.PI * 2 * groupIndex) / Math.max(1, sourceGroups.length);
          const origin = sourceAnchor || {
            x: center.x + Math.cos(fallbackAngle) * 420,
            y: center.y + Math.sin(fallbackAngle) * 420,
            angle: fallbackAngle
          };
          group
            .sort((a, b) => b.degree - a.degree || a.name.localeCompare(b.name))
            .forEach((node, index) => {
              const seed = hashString(node.id + node.name);
              const angle = origin.angle + index * 2.399963229728653 + (seed % 71) / 96;
              const ring = Math.floor(index / 16);
              const radius = (sourceAnchor ? 160 : 210) + Math.sqrt(index + 1) * 31 + ring * 44 + (seed % 34);
              placeNode(node, origin.x + Math.cos(angle) * radius, origin.y + Math.sin(angle) * radius);
            });
        });

        let radius = 420;
        for (const node of clusterNodes) {
          radius = Math.max(radius, Math.hypot(node.x - center.x, node.y - center.y) + node.radius + 100);
        }
        clusterRadii.set(clusterId, radius);
      }

      state.clusterCenters = clusterCenters;
      state.clusterRadii = clusterRadii;
    }

    function runLayout(iterations) {
      const runId = ++state.layoutRun;
      let remaining = iterations;
      const step = () => {
        if (runId !== state.layoutRun) return;
        const batch = Math.min(12, remaining);
        for (let i = 0; i < batch; i += 1) layoutTick(remaining / iterations);
        remaining -= batch;
        statusPill.textContent = remaining > 0 ? `Settling layout ${Math.round((1 - remaining / iterations) * 100)}%` : "Layout ready";
        requestRender();
        if (remaining > 0) {
          requestAnimationFrame(step);
        } else {
          state.layoutReady = true;
          fitToView(true);
        }
      };
      requestAnimationFrame(step);
    }

    function layoutTick(alpha) {
      const edgePull = 0.0028 + alpha * 0.0024;
      const anchorPull = 0.008 + alpha * 0.01;
      const damp = 0.79;

      for (const edge of edges) {
        const source = edge.sourceNode;
        const target = edge.targetNode;
        const dx = target.x - source.x;
        const dy = target.y - source.y;
        const distance = Math.max(1, Math.hypot(dx, dy));
        const ideal = edge.type === "BELONGS_TO" ? 225 : edge.type === "SUPPORTS" ? 175 : 205;
        const force = (distance - ideal) * edgePull;
        const fx = (dx / distance) * force;
        const fy = (dy / distance) * force;
        if (source.type !== "Domain") {
          source.vx += fx;
          source.vy += fy;
        }
        if (target.type !== "Domain") {
          target.vx -= fx;
          target.vy -= fy;
        }
      }

      for (const node of nodes) {
        if (node.type !== "Domain") {
          node.vx += (node.anchorX - node.x) * anchorPull;
          node.vy += (node.anchorY - node.y) * anchorPull;
        }
      }

      applyRepulsion(alpha);
      resolveCollisions();

      for (const node of nodes) {
        if (node.type === "Domain") continue;
        node.vx *= damp;
        node.vy *= damp;
        node.x += Math.max(-18, Math.min(18, node.vx));
        node.y += Math.max(-18, Math.min(18, node.vy));
      }
    }

    function applyRepulsion(alpha) {
      const cellSize = 180;
      const grid = new Map();
      for (const node of nodes) {
        const key = `${Math.floor(node.x / cellSize)},${Math.floor(node.y / cellSize)}`;
        if (!grid.has(key)) grid.set(key, []);
        grid.get(key).push(node);
      }

      for (const [key, bucket] of grid) {
        const [gx, gy] = key.split(",").map(Number);
        const near = [];
        for (let ix = -1; ix <= 1; ix += 1) {
          for (let iy = -1; iy <= 1; iy += 1) {
            const other = grid.get(`${gx + ix},${gy + iy}`);
            if (other) near.push(...other);
          }
        }
        for (const node of bucket) {
          for (const other of near) {
            if (node.index >= other.index) continue;
            const dx = other.x - node.x;
            const dy = other.y - node.y;
            const distance = Math.max(0.1, Math.hypot(dx, dy));
            const range = node.type === other.type ? 132 : 108;
            if (distance >= range) continue;
            const strength = ((range - distance) / range) * (0.58 + alpha * 0.28);
            const fx = (dx / distance) * strength;
            const fy = (dy / distance) * strength;
            if (node.type !== "Domain") {
              node.vx -= fx;
              node.vy -= fy;
            }
            if (other.type !== "Domain") {
              other.vx += fx;
              other.vy += fy;
            }
          }
        }
      }
    }

    function resolveCollisions() {
      const cellSize = 72;
      const grid = new Map();
      for (const node of nodes) {
        const key = `${Math.floor(node.x / cellSize)},${Math.floor(node.y / cellSize)}`;
        if (!grid.has(key)) grid.set(key, []);
        grid.get(key).push(node);
      }

      for (const [key, bucket] of grid) {
        const [gx, gy] = key.split(",").map(Number);
        const near = [];
        for (let ix = -1; ix <= 1; ix += 1) {
          for (let iy = -1; iy <= 1; iy += 1) {
            const other = grid.get(`${gx + ix},${gy + iy}`);
            if (other) near.push(...other);
          }
        }
        for (const node of bucket) {
          for (const other of near) {
            if (node.index >= other.index) continue;
            const dx = other.x - node.x;
            const dy = other.y - node.y;
            const distance = Math.max(0.1, Math.hypot(dx, dy));
            const minDistance = node.radius + other.radius + 18;
            if (distance >= minDistance) continue;
            const force = (minDistance - distance) * 0.11;
            const fx = (dx / distance) * force;
            const fy = (dy / distance) * force;
            if (node.type !== "Domain") {
              node.vx -= fx;
              node.vy -= fy;
            }
            if (other.type !== "Domain") {
              other.vx += fx;
              other.vy += fy;
            }
          }
        }
      }
    }

    function bindEvents() {
      window.addEventListener("resize", () => {
        resizeCanvas();
        requestRender();
      });

      canvas.addEventListener("pointerdown", event => {
        state.dragging = true;
        canvas.classList.add("dragging");
        canvas.setPointerCapture(event.pointerId);
        state.dragStart = { x: event.clientX, y: event.clientY, tx: state.tx, ty: state.ty };
      });

      canvas.addEventListener("pointermove", event => {
        state.pointer = { x: event.offsetX, y: event.offsetY };
        if (state.dragging && state.dragStart) {
          state.tx = state.dragStart.tx + event.clientX - state.dragStart.x;
          state.ty = state.dragStart.ty + event.clientY - state.dragStart.y;
          requestRender();
          return;
        }
        const hovered = hitTest(screenToWorld(event.offsetX, event.offsetY));
        if (hovered !== state.hovered) {
          state.hovered = hovered;
          updateFocusChip();
          requestRender();
        }
      });

      canvas.addEventListener("pointerup", event => {
        const moved = state.dragStart ? Math.hypot(event.clientX - state.dragStart.x, event.clientY - state.dragStart.y) : 0;
        state.dragging = false;
        canvas.classList.remove("dragging");
        if (moved < 4 && state.pointer) {
          const clicked = hitTest(screenToWorld(state.pointer.x, state.pointer.y));
          selectNode(clicked);
        }
      });

      canvas.addEventListener("pointerleave", () => {
        state.hovered = null;
        updateFocusChip();
        requestRender();
      });

      canvas.addEventListener("wheel", event => {
        event.preventDefault();
        const factor = Math.exp(-event.deltaY * 0.0012);
        zoomAt(event.offsetX, event.offsetY, factor);
      }, { passive: false });

      canvas.addEventListener("dblclick", event => {
        const node = hitTest(screenToWorld(event.offsetX, event.offsetY));
        if (node) centerOnNode(node, 1.45);
      });

      document.getElementById("fitBtn").addEventListener("click", () => fitToView(true));
      document.getElementById("resetBtn").addEventListener("click", resetView);
      document.getElementById("themeBtn").addEventListener("click", toggleTheme);
      document.getElementById("toolbarThemeBtn").addEventListener("click", toggleTheme);
      document.getElementById("reflowBtn").addEventListener("click", reflowLayout);
      document.getElementById("leftPanelBtn").addEventListener("click", () => togglePanel("left"));
      document.getElementById("rightPanelBtn").addEventListener("click", () => togglePanel("right"));
      document.getElementById("labelsToggle").addEventListener("change", event => {
        state.showLabels = event.target.checked;
        event.target.closest(".toggle-row").querySelector(".count").textContent = state.showLabels ? "smart" : "off";
        requestRender();
      });
      document.getElementById("egoToggle").addEventListener("change", event => {
        state.egoHighlight = event.target.checked;
        requestRender();
      });
      document.getElementById("edgeOpacity").addEventListener("input", event => {
        state.edgeOpacity = Number(event.target.value) / 100;
        document.getElementById("edgeOpacityVal").textContent = `${event.target.value}%`;
        requestRender();
      });

      document.querySelectorAll("[data-node-type]").forEach(input => {
        input.addEventListener("change", event => {
          const type = event.target.dataset.nodeType;
          event.target.checked ? state.activeNodeTypes.add(type) : state.activeNodeTypes.delete(type);
          updateVisibility();
          requestRender();
        });
      });

      document.querySelectorAll("[data-edge-type]").forEach(input => {
        input.addEventListener("change", event => {
          const type = event.target.dataset.edgeType;
          event.target.checked ? state.activeEdgeTypes.add(type) : state.activeEdgeTypes.delete(type);
          updateVisibility();
          requestRender();
        });
      });

      searchInput.addEventListener("input", updateSearch);
      searchInput.addEventListener("keydown", event => {
        if (event.key === "Enter") {
          const first = searchMatches(searchInput.value)[0];
          if (first) selectAndCenter(first);
        }
      });
    }

    function resizeCanvas() {
      const rect = viewport.getBoundingClientRect();
      state.width = Math.max(1, Math.floor(rect.width));
      state.height = Math.max(1, Math.floor(rect.height));
      state.dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
      canvas.width = Math.floor(state.width * state.dpr);
      canvas.height = Math.floor(state.height * state.dpr);
      minimap.width = Math.floor(178 * state.dpr);
      minimap.height = Math.floor(126 * state.dpr);
    }

    function updateVisibility() {
      state.visibleNodes = nodes.filter(node => state.activeNodeTypes.has(node.type));
      state.visibleIds = new Set(state.visibleNodes.map(node => node.id));
      state.visibleEdges = edges.filter(edge =>
        state.activeEdgeTypes.has(edge.type) &&
        state.visibleIds.has(edge.source) &&
        state.visibleIds.has(edge.target)
      );
      document.getElementById("visibleCount").textContent = formatCount(state.visibleNodes.length);
      statusPill.textContent = `${formatCount(state.visibleNodes.length)} nodes / ${formatCount(state.visibleEdges.length)} edges`;
      if (state.selected && !state.visibleIds.has(state.selected.id)) selectNode(null);
      updateSearch();
      updateFocusChip();
    }

    function requestRender() {
      if (state.needsRender) return;
      state.needsRender = true;
      requestAnimationFrame(render);
    }

    function render() {
      state.needsRender = false;
      const bg = getCss("--canvas");
      ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, state.width, state.height);
      drawGrid();
      ctx.save();
      ctx.translate(state.tx, state.ty);
      ctx.scale(state.scale, state.scale);
      drawClusterGuides();
      drawEdges();
      drawNodes();
      if (state.showLabels) drawLabels();
      ctx.restore();
      drawMinimap();
      zoomPill.textContent = `${Math.round(state.scale * 100)}%`;
    }

    function drawGrid() {
      const spacing = 72 * state.scale;
      if (spacing < 28) return;
      const line = getCss("--line");
      ctx.strokeStyle = hexWithAlpha(line, 0.38);
      ctx.lineWidth = 1;
      ctx.beginPath();
      const startX = ((state.tx % spacing) + spacing) % spacing;
      const startY = ((state.ty % spacing) + spacing) % spacing;
      for (let x = startX; x < state.width; x += spacing) {
        ctx.moveTo(x, 0);
        ctx.lineTo(x, state.height);
      }
      for (let y = startY; y < state.height; y += spacing) {
        ctx.moveTo(0, y);
        ctx.lineTo(state.width, y);
      }
      ctx.stroke();
    }

    function drawClusterGuides() {
      if (!state.clusterCenters || !state.clusterCenters.size) return;
      ctx.save();
      for (const [clusterId, center] of state.clusterCenters) {
        const domain = nodeById.get(clusterId);
        const radius = state.clusterRadii.get(clusterId) || 520;
        const color = domain ? (NODE_COLORS[domain.type] || NODE_COLORS.default) : getCss("--accent");
        ctx.beginPath();
        ctx.arc(center.x, center.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = colorWithAlpha(color, app.dataset.theme === "dark" ? 0.055 : 0.04);
        ctx.fill();
        ctx.lineWidth = 1.2 / Math.sqrt(Math.max(0.8, state.scale));
        ctx.strokeStyle = colorWithAlpha(color, 0.22);
        ctx.stroke();

        const label = domain ? domain.name || domain.id : clusterId;
        const fontSize = 24 / Math.sqrt(Math.max(0.8, state.scale));
        ctx.font = `700 ${fontSize / state.scale}px Inter, system-ui, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = colorWithAlpha(getCss("--canvas"), 0.86);
        const width = ctx.measureText(label).width + 28 / state.scale;
        const height = 34 / state.scale;
        roundRect(ctx, center.x - width / 2, center.y - radius - height - 18 / state.scale, width, height, 7 / state.scale);
        ctx.fill();
        ctx.fillStyle = getCss("--text");
        ctx.fillText(label, center.x, center.y - radius - height / 2 - 18 / state.scale);
      }
      ctx.restore();
    }

    function drawEdges() {
      const focus = getFocusNode();
      const focusNeighbors = focus ? neighbors.get(focus.id) : null;
      ctx.lineCap = "round";

      for (const edge of state.visibleEdges) {
        const style = EDGE_STYLES[edge.type] || EDGE_STYLES.default;
        const source = edge.sourceNode;
        const target = edge.targetNode;
        const focused = !focus || source.id === focus.id || target.id === focus.id || (focusNeighbors && focusNeighbors.has(source.id) && focusNeighbors.has(target.id));
        const alpha = state.egoHighlight && focus ? (focused ? state.edgeOpacity : 0.08) : state.edgeOpacity;
        drawEdge(edge, style, alpha);
      }
      ctx.setLineDash([]);
    }

    function drawEdge(edge, style, alpha) {
      const source = edge.sourceNode;
      const target = edge.targetNode;
      const dx = target.x - source.x;
      const dy = target.y - source.y;
      const distance = Math.max(1, Math.hypot(dx, dy));
      const nx = dx / distance;
      const ny = dy / distance;
      const sx = source.x + nx * (source.radius + 2);
      const sy = source.y + ny * (source.radius + 2);
      const tx = target.x - nx * (target.radius + 3);
      const ty = target.y - ny * (target.radius + 3);
      const curve = edge.type === "SUPPORTS" ? 0.12 : edge.type === "BELONGS_TO" ? -0.08 : 0.04;
      const cx = (sx + tx) / 2 - dy * curve;
      const cy = (sy + ty) / 2 + dx * curve;

      ctx.strokeStyle = colorWithAlpha(style.color, alpha);
      ctx.lineWidth = style.width / Math.sqrt(Math.max(0.7, state.scale));
      ctx.setLineDash(style.dash.map(value => value / Math.sqrt(Math.max(0.7, state.scale))));
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.quadraticCurveTo(cx, cy, tx, ty);
      ctx.stroke();

      const angle = Math.atan2(ty - cy, tx - cx);
      const arrow = 7 / Math.sqrt(Math.max(0.8, state.scale));
      ctx.setLineDash([]);
      ctx.fillStyle = colorWithAlpha(style.color, Math.min(0.95, alpha + 0.12));
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx - Math.cos(angle - 0.52) * arrow, ty - Math.sin(angle - 0.52) * arrow);
      ctx.lineTo(tx - Math.cos(angle + 0.52) * arrow, ty - Math.sin(angle + 0.52) * arrow);
      ctx.closePath();
      ctx.fill();

      if (state.scale > 1.25 && (edge.sourceNode === state.selected || edge.targetNode === state.selected)) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(Math.atan2(ty - sy, tx - sx));
        ctx.font = `${10 / state.scale}px Inter, system-ui, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = getCss("--canvas");
        const width = ctx.measureText(edge.type).width + 8 / state.scale;
        const height = 16 / state.scale;
        ctx.fillRect(-width / 2, -height / 2, width, height);
        ctx.fillStyle = colorWithAlpha(style.color, 0.95);
        ctx.fillText(edge.type, 0, 0);
        ctx.restore();
      }
    }

    function drawNodes() {
      const focus = getFocusNode();
      const focusNeighbors = focus ? neighbors.get(focus.id) : null;

      for (const node of state.visibleNodes) {
        const isFocus = node === focus;
        const isNeighbor = focusNeighbors && focusNeighbors.has(node.id);
        const alpha = state.egoHighlight && focus ? (isFocus || isNeighbor ? 1 : 0.2) : 1;
        const color = NODE_COLORS[node.type] || NODE_COLORS.default;
        const radius = node.radius + (node === state.selected ? 4 : node === state.hovered ? 3 : 0);

        ctx.beginPath();
        ctx.fillStyle = colorWithAlpha(color, alpha);
        ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.lineWidth = (node === state.selected ? 3 : node === state.hovered ? 2.2 : 1.2) / Math.sqrt(Math.max(0.8, state.scale));
        ctx.strokeStyle = node === state.selected ? getCss("--text") : colorWithAlpha("#ffffff", alpha * 0.8);
        ctx.stroke();

        if (node.type === "Domain") {
          ctx.beginPath();
          ctx.arc(node.x, node.y, radius + 7, 0, Math.PI * 2);
          ctx.strokeStyle = colorWithAlpha(color, 0.22 * alpha);
          ctx.lineWidth = 8 / Math.sqrt(Math.max(0.8, state.scale));
          ctx.stroke();
        }
      }
    }

    function drawLabels() {
      const labelZoom = state.scale;
      const focus = getFocusNode();
      const focusNeighbors = focus ? neighbors.get(focus.id) : null;
      ctx.textBaseline = "middle";
      ctx.textAlign = "left";

      for (const node of state.visibleNodes) {
        const focused = node === state.selected || node === state.hovered;
        const neighbor = focusNeighbors && focusNeighbors.has(node.id);
        const structural = node.type === "Domain" || node.type === "Source";
        const prominent = focused || structural || (neighbor && labelZoom > 1.25);
        if (!prominent && labelZoom < 2.2) continue;
        if (!focused && node.type === "Source" && labelZoom < 1.15) continue;
        if (!focused && node.type === "Entity" && node.degree < 5 && labelZoom < 2.8) continue;
        const fontSize = Math.max(9, Math.min(13, 11 / Math.sqrt(Math.max(0.7, labelZoom))));
        const text = truncate(node.name || node.id, focused ? 42 : prominent ? 28 : 18);
        const x = node.x + node.radius + 5 / labelZoom;
        const y = node.y;
        ctx.font = `${fontSize / labelZoom}px Inter, system-ui, sans-serif`;
        const width = ctx.measureText(text).width + 8 / labelZoom;
        const height = (fontSize + 6) / labelZoom;
        if (focused || node.type === "Domain") {
          ctx.fillStyle = colorWithAlpha(getCss("--canvas"), 0.78);
          roundRect(ctx, x - 4 / labelZoom, y - height / 2, width, height, 4 / labelZoom);
          ctx.fill();
        }
        ctx.lineWidth = 3 / labelZoom;
        ctx.strokeStyle = colorWithAlpha(getCss("--canvas"), 0.9);
        ctx.strokeText(text, x, y + 0.5 / labelZoom);
        ctx.fillStyle = getCss("--text");
        ctx.fillText(text, x, y + 0.5 / labelZoom);
      }
    }

    function drawMinimap() {
      const w = minimap.width / state.dpr;
      const h = minimap.height / state.dpr;
      mctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
      mctx.clearRect(0, 0, w, h);
      const bounds = graphBounds(state.visibleNodes);
      const scale = Math.min((w - 18) / Math.max(1, bounds.width), (h - 18) / Math.max(1, bounds.height));
      const ox = (w - bounds.width * scale) / 2 - bounds.minX * scale;
      const oy = (h - bounds.height * scale) / 2 - bounds.minY * scale;

      mctx.fillStyle = colorWithAlpha(getCss("--panel"), 0.92);
      mctx.fillRect(0, 0, w, h);
      mctx.strokeStyle = getCss("--line");
      mctx.strokeRect(0.5, 0.5, w - 1, h - 1);

      for (const edge of state.visibleEdges) {
        mctx.strokeStyle = colorWithAlpha((EDGE_STYLES[edge.type] || EDGE_STYLES.default).color, 0.28);
        mctx.lineWidth = 0.8;
        mctx.beginPath();
        mctx.moveTo(edge.sourceNode.x * scale + ox, edge.sourceNode.y * scale + oy);
        mctx.lineTo(edge.targetNode.x * scale + ox, edge.targetNode.y * scale + oy);
        mctx.stroke();
      }

      for (const node of state.visibleNodes) {
        mctx.fillStyle = NODE_COLORS[node.type] || NODE_COLORS.default;
        mctx.beginPath();
        mctx.arc(node.x * scale + ox, node.y * scale + oy, node === state.selected ? 3 : 1.8, 0, Math.PI * 2);
        mctx.fill();
      }

      const topLeft = screenToWorld(0, 0);
      const bottomRight = screenToWorld(state.width, state.height);
      const vx = topLeft.x * scale + ox;
      const vy = topLeft.y * scale + oy;
      const vw = (bottomRight.x - topLeft.x) * scale;
      const vh = (bottomRight.y - topLeft.y) * scale;
      mctx.strokeStyle = getCss("--accent");
      mctx.lineWidth = 1.5;
      mctx.strokeRect(vx, vy, vw, vh);
    }

    function updateSearch() {
      const matches = searchMatches(searchInput.value);
      searchResults.innerHTML = matches.slice(0, 7).map(node => `
        <button class="result-btn" data-result-id="${escapeHtml(node.id)}" type="button">
          <strong>${escapeHtml(node.name || node.id)}</strong>
          <span>${escapeHtml(node.type)} / degree ${node.degree}</span>
        </button>
      `).join("");
      searchResults.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          const node = nodeById.get(button.dataset.resultId);
          if (node) selectAndCenter(node);
        });
      });
    }

    function searchMatches(query) {
      const term = String(query || "").trim().toLowerCase();
      if (!term) return [];
      return state.visibleNodes
        .map(node => {
          const name = String(node.name || "");
          const lower = name.toLowerCase();
          const index = lower.indexOf(term);
          const score = index === 0 ? 0 : index > -1 ? 1 : lower.includes(term.replace(/\s+/g, "")) ? 2 : 99;
          return { node, score };
        })
        .filter(item => item.score < 99)
        .sort((a, b) => a.score - b.score || b.node.degree - a.node.degree || a.node.name.localeCompare(b.node.name))
        .map(item => item.node);
    }

    function selectAndCenter(node) {
      selectNode(node);
      centerOnNode(node, Math.max(1.15, state.scale));
    }

    function selectNode(node) {
      state.selected = node;
      renderDetail(node);
      updateFocusChip();
      requestRender();
    }

    function renderDetail(node) {
      if (!node) {
        detailPanel.className = "empty";
        detailPanel.textContent = "Select a node to inspect its properties and graph neighborhood.";
        return;
      }
      detailPanel.className = "";
      const props = Object.entries(node.props || {});
      const related = incidentEdges.get(node.id)
        .slice()
        .sort((a, b) => a.type.localeCompare(b.type))
        .slice(0, 26);
      detailPanel.innerHTML = `
        <div class="detail-head">
          <span class="type-badge"><span class="swatch" style="--swatch: ${NODE_COLORS[node.type] || NODE_COLORS.default}"></span>${escapeHtml(node.type)}</span>
          <h2 class="detail-title">${escapeHtml(node.name || node.id)}</h2>
        </div>
        <div class="meta-grid">
          <div class="meta-cell"><span>ID</span><strong>${escapeHtml(node.id)}</strong></div>
          <div class="meta-cell"><span>Degree</span><strong>${node.degree}</strong></div>
          <div class="meta-cell"><span>Inbound</span><strong>${node.inDegree}</strong></div>
          <div class="meta-cell"><span>Outbound</span><strong>${node.outDegree}</strong></div>
        </div>
        <div class="section">
          <p class="section-title">Properties</p>
          <div class="prop-table">
            ${props.length ? props.map(([key, value]) => `
              <div class="prop-row">
                <div class="prop-key">${escapeHtml(key)}</div>
                <div class="prop-val">${escapeHtml(formatValue(value))}</div>
              </div>
            `).join("") : `<div class="empty">No properties</div>`}
          </div>
        </div>
        <div class="section">
          <p class="section-title">Neighborhood</p>
          <div class="neighbor-list">
            ${related.length ? related.map(edge => {
              const outbound = edge.source === node.id;
              const other = outbound ? edge.targetNode : edge.sourceNode;
              const arrow = outbound ? "->" : "<-";
              return `
                <button class="neighbor" data-neighbor-id="${escapeHtml(other.id)}" type="button">
                  <strong>${escapeHtml(other.name || other.id)}</strong>
                  <span>${escapeHtml(node.name || node.id)} ${arrow} ${escapeHtml(edge.type)} ${arrow} ${escapeHtml(other.type)}</span>
                </button>
              `;
            }).join("") : `<div class="empty">No visible relationships</div>`}
          </div>
        </div>
      `;
      detailPanel.querySelectorAll("[data-neighbor-id]").forEach(button => {
        button.addEventListener("click", () => {
          const other = nodeById.get(button.dataset.neighborId);
          if (other) selectAndCenter(other);
        });
      });
    }

    function updateFocusChip() {
      const node = getFocusNode();
      if (!node) {
        focusChip.hidden = true;
        return;
      }
      focusChip.hidden = false;
      focusTitle.textContent = node.name || node.id;
      focusMeta.textContent = `${node.type} / degree ${node.degree} / ${node.outDegree} out, ${node.inDegree} in`;
    }

    function getFocusNode() {
      return state.hovered || state.selected;
    }

    function hitTest(point) {
      let best = null;
      let bestDistance = Infinity;
      const tolerance = 8 / state.scale;
      for (let i = state.visibleNodes.length - 1; i >= 0; i -= 1) {
        const node = state.visibleNodes[i];
        const distance = Math.hypot(point.x - node.x, point.y - node.y);
        const limit = node.radius + tolerance;
        if (distance <= limit && distance < bestDistance) {
          best = node;
          bestDistance = distance;
        }
      }
      return best;
    }

    function centerOnNode(node, targetScale) {
      if (!node) return;
      const nextScale = clamp(targetScale, 0.18, 4);
      state.scale = nextScale;
      state.tx = state.width / 2 - node.x * state.scale;
      state.ty = state.height / 2 - node.y * state.scale;
      requestRender();
    }

    function fitToView(animate) {
      const visible = state.visibleNodes.length ? state.visibleNodes : nodes;
      const bounds = graphBounds(visible);
      const pad = 90;
      const scale = clamp(Math.min((state.width - pad) / Math.max(1, bounds.width), (state.height - pad) / Math.max(1, bounds.height)), 0.12, 2.2);
      state.scale = scale;
      state.tx = state.width / 2 - (bounds.minX + bounds.width / 2) * scale;
      state.ty = state.height / 2 - (bounds.minY + bounds.height / 2) * scale;
      if (animate) statusPill.textContent = `${formatCount(state.visibleNodes.length)} nodes / ${formatCount(state.visibleEdges.length)} edges`;
      requestRender();
    }

    function resetView() {
      nodeTypes.forEach(type => state.activeNodeTypes.add(type));
      edgeTypes.forEach(type => state.activeEdgeTypes.add(type));
      document.querySelectorAll("[data-node-type], [data-edge-type]").forEach(input => {
        input.checked = true;
      });
      searchInput.value = "";
      state.selected = null;
      state.hovered = null;
      updateVisibility();
      renderDetail(null);
      fitToView(true);
    }

    function reflowLayout() {
      state.layoutReady = false;
      buildLayout();
      updateVisibility();
      fitToView(false);
      runLayout(240);
    }

    function zoomAt(x, y, factor) {
      const before = screenToWorld(x, y);
      state.scale = clamp(state.scale * factor, 0.08, 5);
      state.tx = x - before.x * state.scale;
      state.ty = y - before.y * state.scale;
      requestRender();
    }

    function screenToWorld(x, y) {
      return {
        x: (x - state.tx) / state.scale,
        y: (y - state.ty) / state.scale
      };
    }

    function graphBounds(list) {
      if (!list.length) return { minX: -1, minY: -1, maxX: 1, maxY: 1, width: 2, height: 2 };
      let minX = Infinity;
      let minY = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;
      for (const node of list) {
        minX = Math.min(minX, node.x - node.radius);
        minY = Math.min(minY, node.y - node.radius);
        maxX = Math.max(maxX, node.x + node.radius);
        maxY = Math.max(maxY, node.y + node.radius);
      }
      return { minX, minY, maxX, maxY, width: maxX - minX, height: maxY - minY };
    }

    function toggleTheme() {
      const next = app.dataset.theme === "dark" ? "light" : "dark";
      app.dataset.theme = next;
      updateThemeButtons();
      requestRender();
    }

    function updateThemeButtons() {
      const isDark = app.dataset.theme === "dark";
      const label = isDark ? "Light" : "Dark";
      document.getElementById("themeBtn").textContent = label;
      document.getElementById("toolbarThemeBtn").textContent = label;
    }

    function togglePanel(side) {
      app.classList.toggle(`hide-${side}`);
      resizeCanvas();
      requestAnimationFrame(() => {
        resizeCanvas();
        fitToView(false);
        updatePanelButtons();
      });
    }

    function updatePanelButtons() {
      const leftHidden = app.classList.contains("hide-left");
      const rightHidden = app.classList.contains("hide-right");
      const leftButton = document.getElementById("leftPanelBtn");
      const rightButton = document.getElementById("rightPanelBtn");
      leftButton.textContent = leftHidden ? "Show left" : "Hide left";
      rightButton.textContent = rightHidden ? "Show right" : "Hide right";
      leftButton.setAttribute("aria-pressed", String(!leftHidden));
      rightButton.setAttribute("aria-pressed", String(!rightHidden));
    }

    function countBy(list, key) {
      const counts = new Map();
      for (const item of list) counts.set(item[key], (counts.get(item[key]) || 0) + 1);
      return counts;
    }

    function hashString(value) {
      let hash = 2166136261;
      for (let i = 0; i < value.length; i += 1) {
        hash ^= value.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function placeNode(node, x, y) {
      node.x = x;
      node.y = y;
      node.anchorX = x;
      node.anchorY = y;
      node.vx = 0;
      node.vy = 0;
    }

    function typeRank(type) {
      if (type === "Domain") return 0;
      if (type === "Source") return 1;
      return 2;
    }

    function normalizeDomainKey(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[_\s]+/g, "-");
    }

    function formatCount(value) {
      return new Intl.NumberFormat("en-US").format(value);
    }

    function formatValue(value) {
      if (value === null || value === undefined) return "";
      if (typeof value === "string") return value;
      return JSON.stringify(value, null, 2);
    }

    function truncate(value, max) {
      const text = String(value || "");
      return text.length > max ? `${text.slice(0, Math.max(0, max - 3))}...` : text;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getCss(name) {
      return getComputedStyle(app).getPropertyValue(name).trim();
    }

    function colorWithAlpha(hex, alpha) {
      const normalized = hex.trim();
      if (normalized.startsWith("rgb")) return normalized;
      const raw = normalized.replace("#", "");
      const bigint = parseInt(raw.length === 3 ? raw.split("").map(char => char + char).join("") : raw, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return `rgba(${r}, ${g}, ${b}, ${clamp(alpha, 0, 1)})`;
    }

    function hexWithAlpha(color, alpha) {
      if (color.startsWith("#")) return colorWithAlpha(color, alpha);
      return color;
    }

    function roundRect(context, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      context.beginPath();
      context.moveTo(x + r, y);
      context.arcTo(x + width, y, x + width, y + height, r);
      context.arcTo(x + width, y + height, x, y + height, r);
      context.arcTo(x, y + height, x, y, r);
      context.arcTo(x, y, x + width, y, r);
      context.closePath();
    }
  </script>
</body>
