[project]
name = "obsidian-kdb"
version = "0.1.0"
description = "Karpathy-style LLM-compiled knowledge base for Obsidian vaults."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Joseph" }]
dependencies = [
    "jsonschema>=4.17",
    "requests>=2.31",
    "anthropic>=0.40",
    "openai>=1.40",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
dev = ["pytest>=7", "pytest-cov>=4"]

[project.scripts]
kdb-scan              = "kdb_compiler.kdb_scan:main"
kdb-validate-scan     = "kdb_compiler.validate_last_scan:main"
kdb-validate          = "kdb_compiler.validate_compile_result:main"
kdb-validate-response = "kdb_compiler.validate_compiled_source_response:main"
kdb-manifest          = "kdb_compiler.manifest_update:main"
kdb-plan              = "kdb_compiler.planner:main"
kdb-compile-sources   = "kdb_compiler.compiler:main"
kdb-compile           = "kdb_compiler.kdb_compile:main"
kdb-replay            = "kdb_compiler.response_replay:main"

[build-system]
requires      = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["kdb_compiler*"]
exclude = ["knowledge_graph*", "docs*", "tests*"]

[tool.setuptools.package-data]
kdb_compiler = ["schemas/*.json"]

[tool.pytest.ini_options]
testpaths   = ["kdb_compiler/tests"]
python_files = ["test_*.py"]
addopts     = "-ra -q"
