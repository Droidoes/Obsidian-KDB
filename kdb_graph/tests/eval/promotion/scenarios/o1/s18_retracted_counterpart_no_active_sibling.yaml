    # authoritative output. The candidate's counterpart_claim_id +
    # counterpart_links_to_ref fields below are kept as documentation of
    # what Analysis-time INSPECTED (the retracted Claim + the prior
    # LINKS_TO), not as a counterpart-engagement signal.
